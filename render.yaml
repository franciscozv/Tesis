services:
  - type: web
    name: tesis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_FROM
        value: IEP Santa Juana <noreply@iepsantajuana.cl>
      - key: COMMON_RATE_LIMIT_WINDOW_MS
        value: 1000
      - key: COMMON_RATE_LIMIT_MAX_REQUESTS
        value: 1000
      # Las siguientes las ingresas manualmente en el dashboard de Render:
      # SUPABASE_URL
      # SUPABASE_ANON_KEY
      # JWT_SECRET
      # EMAIL_USER
      # EMAIL_PASSWORD
      # CORS_ORIGIN        (URL de Vercel, ej: https://tu-app.vercel.app)
      # FRONTEND_URL       (URL de Vercel, ej: https://tu-app.vercel.app)
